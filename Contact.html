<form
  action="https://formspree.io/f/xjgznpwl"
  class="contact-form"
  method="POST"
>

  <label for="name">Name</label>

  <input
    type="text"
    id="name"
    name="name"
    placeholder="Your Name"
    class="paper-input"
    required
  />

  <label for="email">Email</label>

  <input
    type="email"
    id="email"
    name="email"
    placeholder="Your Email"
    class="paper-input"
    required
  />

  <label for="message">Message</label>

  <textarea
    id="message"
    name="message"
    placeholder="Write your message here..."
    class="paper-input"
    rows="5"
    required
  ></textarea>

  <div class="button-container">
    <button type="submit" class="btn btn-stamp">
      Send Message
    </button>
  </div>

</form>
