    <section class="container">
      <div class="letter-box">
        <h1 class="contact-title">Get in Touch</h1>

<!-- CONTACT SECTION -->

<section class="container">
  <div class="letter-box">
    
    <h1 class="contact-title">Get in Touch</h1>

    <!-- CONTACT FORM -->

    <form class="contact-form">
      <label for="name">Name</label>

      <input
        type="text"
        id="name"
        placeholder="Your Name"
        class="paper-input"
        required
      />

      <label for="email">Email</label>

      <input
        type="email"
        id="email"
        placeholder="Your Email"
        class="paper-input"
        required
      />

      <label for="message">Message</label>

      <textarea
        id="message"
        placeholder="Write your message here..."
        class="paper-input"
        rows="5"
        required
      ></textarea>

      <div class="button-container">
        <button type="submit" class="btn btn-stamp">
          Send Message
        </button>
      </div>
    </form>

    <!-- LINE -->

    <hr />

    <!-- CONTACT INFO -->

    <div class="contact-info">
      <h2>Contact Information</h2>

      <p>
        <strong>Email:</strong>
        <a href="mailto:zaarahokkers@gmail.com">
          zaarahokkers@gmail.com
        </a>
      </p>

      <p>
        <strong>LinkedIn:</strong>
        <a
          href="https://www.linkedin.com/in/zaarah-okkers-3688b1377"
          target="_blank"
          rel="noopener noreferrer"
        >
          View LinkedIn Profile
        </a>
      </p>

      <p>
        <strong>Location:</strong>
        <a
          href="https://www.lifechoicesacademy.com"
          target="_blank"
          rel="noopener noreferrer"
        >
          Life Choices Academy
        </a>
      </p>
    </div>

  </div>
</section>
